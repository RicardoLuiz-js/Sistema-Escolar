<!DOCTYPE html>
<html lang="pt-br">
<head>
  <!-- Configurações básicas do documento -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle De Bens</title>
  
  <!-- Link para o arquivo CSS e ícone da página -->
 
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon"  href="../imagens/bens.ico">

   
    <!-- Estilos inline para a caixa de mensagem -->
    <style>
  
      .modal {
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
}

.modal-content {
    background-color: #fff;
    margin: 5% auto;
    padding: 20px;
    border-radius: 8px;
    width: 400px;
    max-width: 80%;
    
}

.close {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
}

.close:hover {
    color: #000;
}

.btn-cancelar {
    background-color: #6c757d;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.btn-excluir {
    
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
.btn-excluirc{
background-color: #4CAF50;
}

.btn-cancelar:hover {
    background-color: #5a6268;
}

.btn-opcao {
    background-color: #f8f9fa;
    border: 2px solid #dee2e6;
    border-radius: 8px;
    padding: 15px;
    text-align: left;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.3s ease;
}

.btn-opcao:hover {
    background-color: #e9ecef;
    border-color: #007bff;
    transform: translateY(-2px);
}

.btn-salvar {
    background-color: #28a745;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.btn-salvar:hover {
    background-color: #218838;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    box-sizing: border-box;
}

.form-group textarea {
    resize: vertical;
}

    </style>
</head>
<body>
  <!-- Cabeçalho da página -->
  <header>
    <a href="index.html">
      <p>Controle De Bens</p>
    </a>
  </header>

  <!-- Conteúdo principal da página -->
  <main>
    <!-- Ícone do menu móvel -->
    <div id="mobile-menu-icon">&#9776;</div> <!-- Ícone de hambúrguer -->
    
    <!-- Menu de navegação -->
    <div id="Menu">    
      <div id="close-menu-icon">&#10005;</div> <!-- Botão de "X" para fechar o menu -->
      <a href="index.html">  
        <div class="circle-container">  
          <div class="circle"><img class="icon" src="../imagens/home.png" alt=""></div>
          <p>Home</p>
        </div>
      </a>
      <a href="cadastro.html">  
        <div class="circle-container"> 
          <div class="circle"><img class="icon" src="../imagens/adicionar.png" alt=""></div>
          <p>Adicionar</p>
        </div>
      </a>
      
      <a href="LimparDados.html"> 
        <div class="circle-container">
          <div class="circle"><img class="icon1" src="../imagens/Limpar.png" alt=""></div>
          <p>Limpar Dados</p>
        </div>
      </a>
      <a href="relatorios.html"> 
        <div class="circle-container"> 
          <div class="circle"><img class="icon1" src="../imagens/Relatorios.png" alt=""></div>
          <p>Relatorios</p>
        </div>
      </a>
    </div>

    <!-- Corpo principal do conteúdo -->
    <div id="corpo">
      <!-- Cabeçalho da seção -->
      <div id="cabecalho">
        <p>Home</p>
      </div>

      <!-- Seção de status e filtros -->
      <div id="form-cab" style="  margin-top: 50px;">
      <div id="form-items">
        <div id="categorias">  
         <select id="filtro-local" class="filtro-select">
    <option value="">Todos os locais</option>
</select>
        </div>

        <div id="pesquisa">
          <input id="searchInput" onkeyup="searchTable()" class="pesquisa" type="search" placeholder="Pesquise Por Bens">
        </div>

        <div id="quantity-items"><p id="total-itens"></p></div>
      </div>
      </div>

      

      <!-- Tabela de produtos cadastrados -->
      <div id="form-container">

<!-- Modal de Exclusão -->
<div id="modal-excluir" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Excluir Item</h3>
        <p>Digite o motivo da exclusão:</p>
        <textarea id="motivo-exclusao" rows="4" placeholder="Motivo da exclusão..." style="width: 100%; margin: 10px 0; padding: 10px;"></textarea>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button id="btn-cancelar-exclusao" class="btn-cancelar">Cancelar</button>
            <button id="btn-confirmar-exclusao" class="btn-excluir btn-excluirc">Confirmar Exclusão</button>
        </div>
    </div>
</div>

<!-- Modal de Opções de Edição -->
<div id="modal-opcoes-edicao" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Opções para o Item</h3>
        <p>Selecione o que deseja fazer:</p>
        
        <div style="display: flex; flex-direction: column; gap: 15px; margin: 20px 0;">
            <button id="btn-editar-informacoes" class="btn-opcao">
                ✏️ Editar Informações
            </button>
            
            <button id="btn-transferir-local" class="btn-opcao">
                🚚 Transferir de Local
            </button>
        </div>
        
        <div style="display: flex; justify-content: flex-end;">
            <button id="btn-cancelar-opcoes" class="btn-cancelar">Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal de Editar Informações -->
<div id="modal-editar-informacoes" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Editar Informações do Item</h3>
        
        <form id="form-editar-info">
            <input type="hidden" id="editar-info-id">
            
            <div class="form-group">
                <label for="editar-info-nome">Nome:</label>
                <input type="text" id="editar-info-nome" required>
            </div>
            
            <div class="form-group">
                <label for="editar-info-descricao">Descrição:</label>
                <textarea id="editar-info-descricao" rows="3" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="editar-info-tombo">Número de Tombo:</label>
                <input type="text" id="editar-info-tombo" required>
            </div>
            
            <div class="form-group">
                <label for="editar-info-motivo">Motivo da Edição:</label>
                <textarea id="editar-info-motivo" rows="3" placeholder="Descreva o motivo das alterações..." required></textarea>
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button type="button" id="btn-cancelar-edicao-info" class="btn-cancelar">Cancelar</button>
                <button type="submit" id="btn-confirmar-edicao-info" class="btn-salvar">Salvar Alterações</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal de Transferir Local -->
<div id="modal-transferir-local" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Transferir Item para outro Local</h3>
        
        <form id="form-transferir-local">
            <input type="hidden" id="transferir-id">
            
            <div class="form-group">
                <label for="transferir-local-atual">Local Atual:</label>
                <input type="text" id="transferir-local-atual" readonly>
            </div>
            
            <div class="form-group">
                <label for="transferir-local-novo">Novo Local:</label>
                <input type="text" id="transferir-local-novo" placeholder="Digite o novo local..." required>
            </div>
            
            <div class="form-group">
                <label for="transferir-motivo">Motivo da Transferência:</label>
                <textarea id="transferir-motivo" rows="3" placeholder="Descreva o motivo da transferência..." required></textarea>
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button type="button" id="btn-cancelar-transferencia" class="btn-cancelar">Cancelar</button>
                <button type="submit" id="btn-confirmar-transferencia" class="btn-salvar">Confirmar Transferência</button>
            </div>
        </form>
    </div>
</div>

        <section id="bens-cadastrados">
          <table id="myTable">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Descrição</th>
                 <th>Local</th>
                <th class="visible">Código</th>
                <th class="data">Data de Entrada</th>
                <th>Editar</th>
                 <th>Excluir</th>
               
              </tr>
            </thead>
            <tbody id="tabela-bens">
              <!-- As linhas da tabela serão preenchidas aqui via JavaScript -->
            </tbody>
          </table>
        </section>
      </div>
    </div>
  </main>

 <!-- Caixa de mensagem para feedback ao usuário -->
 <div id="message-box"></div>
  <!-- Link para o arquivo JavaScript -->
  <script src="../js/global.js" ></script>
  <script src="../js/script.js" ></script>
</body>
</html>
